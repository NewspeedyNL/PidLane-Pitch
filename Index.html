<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PidLane — Your car talks. We translate.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0E1A;--card:#111827;--card2:#161D2E;--blue:#1A6FFF;--cyan:#00D4FF;
  --orange:#FF6B35;--green:#22C55E;--red:#EF4444;--yellow:#F59E0B;
  --white:#FFFFFF;--mist:#8892A4;--border:#1E2A3E;
  --f-display:'Space Grotesk',sans-serif;--f-body:'Inter',sans-serif;--f-mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:var(--f-body);line-height:1.6;overflow-x:hidden}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 48px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--f-display);font-weight:700;font-size:20px;display:flex;align-items:center;gap:8px}
.bolt{color:var(--cyan)}
.nav-links{display:flex;gap:28px}
.nav-links a{color:var(--mist);text-decoration:none;font-size:13px;transition:color .2s}
.nav-links a:hover{color:var(--white)}
.nav-right{display:flex;align-items:center;gap:12px}
.lang-switch{display:flex;gap:4px}
.lang-btn{background:transparent;border:1px solid var(--border);color:var(--mist);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--f-body);transition:all .2s}
.lang-btn.active,.lang-btn:hover{background:rgba(26,111,255,.15);border-color:var(--blue);color:var(--white)}
.nav-cta{background:var(--blue);color:#fff;padding:10px 22px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;transition:background .2s}
.nav-cta:hover{background:#0f5ce8}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;padding:120px 48px 80px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 60% 40%,rgba(26,111,255,.12) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 80% 60%,rgba(0,212,255,.07) 0%,transparent 60%)}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3}
